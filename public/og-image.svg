<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern subtle -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff08" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glow circles -->
  <circle cx="200" cy="150" r="250" fill="#3b82f6" opacity="0.07"/>
  <circle cx="1000" cy="480" r="300" fill="#8b5cf6" opacity="0.08"/>

  <!-- Logo badge -->
  <rect x="80" y="80" width="100" height="100" rx="24" fill="url(#blue)"/>
  <text x="87" y="162" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="86" fill="white">Z</text>
  <circle cx="168" cy="98" r="18" fill="url(#gold)"/>
  <text x="160" y="104" font-family="Arial" font-weight="700" font-size="11" fill="white">AI</text>

  <!-- Main title -->
  <text x="80" y="270" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="90" fill="white">zyAI.ro</text>

  <!-- Subtitle with gradient effect -->
  <rect x="80" y="295" width="680" height="5" rx="3" fill="url(#blue)" opacity="0.8"/>

  <!-- Tagline -->
  <text x="80" y="370" font-family="Arial, sans-serif" font-weight="400" font-size="36" fill="#94a3b8">Platforma națională de anunțuri din România</text>

  <!-- Features pills -->
  <rect x="80" y="420" width="140" height="44" rx="22" fill="#1e40af" opacity="0.8"/>
  <text x="150" y="447" font-family="Arial" font-size="18" fill="white" text-anchor="middle">🚗 Auto</text>

  <rect x="240" y="420" width="195" height="44" rx="22" fill="#1e40af" opacity="0.8"/>
  <text x="337" y="447" font-family="Arial" font-size="18" fill="white" text-anchor="middle">🏠 Imobiliare</text>

  <rect x="455" y="420" width="145" height="44" rx="22" fill="#1e40af" opacity="0.8"/>
  <text x="527" y="447" font-family="Arial" font-size="18" fill="white" text-anchor="middle">💼 Joburi</text>

  <rect x="620" y="420" width="165" height="44" rx="22" fill="#1e40af" opacity="0.8"/>
  <text x="702" y="447" font-family="Arial" font-size="18" fill="white" text-anchor="middle">🔧 Servicii</text>

  <!-- AI badge right side -->
  <rect x="820" y="200" width="320" height="200" rx="20" fill="#ffffff08" stroke="#ffffff15" stroke-width="1"/>
  <text x="980" y="265" font-family="Arial Black" font-weight="900" font-size="28" fill="url(#gold)" text-anchor="middle">⚡ Powered by AI</text>
  <text x="980" y="305" font-family="Arial" font-size="18" fill="#94a3b8" text-anchor="middle">Caută inteligent</text>
  <text x="980" y="335" font-family="Arial" font-size="18" fill="#94a3b8" text-anchor="middle">Postează gratuit</text>
  <text x="980" y="365" font-family="Arial" font-size="18" fill="#94a3b8" text-anchor="middle">100% Românesc</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="url(#blue)" opacity="0.3"/>
  <text x="600" y="616" font-family="Arial" font-size="16" fill="#94a3b8" text-anchor="middle">www.zyai.ro — Anunțuri gratuite în toată România</text>
</svg>
